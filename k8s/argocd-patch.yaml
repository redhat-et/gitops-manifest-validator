apiVersion: argoproj.io/v1beta1
kind: ArgoCD
metadata:
  name: openshift-gitops
  namespace: openshift-gitops
spec:
  repo:
    # Volumes for CMP sidecar
    volumes:
      # Plugin configuration
      - name: cmp-plugin-config
        configMap:
          name: manifest-validator-plugin
      # CMP temporary directory
      - name: cmp-tmp
        emptyDir: {}

    # CMP Sidecar Container
    sidecarContainers:
      - name: manifest-validator
        # Custom image with all validation tools
        # Using local registry (default-route-openshift-image-registry)
        image: image-registry.openshift-image-registry.svc:5000/openshift-gitops/manifest-validator:v1.0.0
        imagePullPolicy: Always

        # ArgoCD CMP server entrypoint (provided by init container)
        command: ["/var/run/argocd/argocd-cmp-server"]

        # Security context - runs as argocd user (999)
        securityContext:
          runAsNonRoot: true
          allowPrivilegeEscalation: false
          capabilities:
            drop:
              - ALL

        # Environment variables for Ollama/OpenAI configuration
        env:
          - name: OPENAI_BASE_URL
            valueFrom:
              configMapKeyRef:
                name: cmp-openai-config
                key: OPENAI_BASE_URL
          - name: OPENAI_API_KEY
            valueFrom:
              configMapKeyRef:
                name: cmp-openai-config
                key: OPENAI_API_KEY
          - name: OPENAI_MODEL_NAME
            valueFrom:
              configMapKeyRef:
                name: cmp-openai-config
                key: OPENAI_MODEL_NAME
          - name: OPENAI_TIMEOUT
            valueFrom:
              configMapKeyRef:
                name: cmp-openai-config
                key: OPENAI_TIMEOUT

        # Resource limits
        resources:
          limits:
            cpu: 500m
            memory: 512Mi
          requests:
            cpu: 100m
            memory: 128Mi

        # Volume mounts
        volumeMounts:
          # ArgoCD runtime files (copyutil init container provides this)
          - name: var-files
            mountPath: /var/run/argocd
          # Plugin socket directory (use existing 'plugins' volume shared with repo-server)
          - name: plugins
            mountPath: /home/argocd/cmp-server/plugins
          # Plugin configuration
          - name: cmp-plugin-config
            mountPath: /home/argocd/cmp-server/config/plugin.yaml
            subPath: plugin.yaml
          # Temporary directory
          - name: cmp-tmp
            mountPath: /tmp

  server:
    volumes:
      - name: manifest-validator-extension
        configMap:
          name: manifest-validator-extension
    volumeMounts:
      - name: manifest-validator-extension
        mountPath: /tmp/extensions/manifest-validator/
