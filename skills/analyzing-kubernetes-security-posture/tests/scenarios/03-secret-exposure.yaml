# Pressure Scenario 3: Secret Exposure
# This manifest exposes sensitive credentials through multiple vectors:
#   - Database password in plain-text environment variable
#   - API keys in environment variables (visible in pod spec, logs, kubectl describe)
#   - No encryption at rest considerations
#   - Secrets passed as command-line arguments (visible in /proc/cmdline, ps output)
#
# Expected findings:
#   - Plain-text passwords in env vars are exposed via K8s API, etcd, logs
#   - kubectl describe pod reveals all env var values
#   - Container process environment is readable by any process in the same pod
#   - API keys should use Secret resources with volume mounts, not env vars
#   - Command-line args with secrets are visible in process listings
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: payment-service
  namespace: production
  labels:
    app: payment-service
    tier: backend
    sensitivity: high
spec:
  replicas: 2
  selector:
    matchLabels:
      app: payment-service
  template:
    metadata:
      labels:
        app: payment-service
        tier: backend
    spec:
      containers:
        - name: payment
          image: payment-service:v1.8.3
          ports:
            - containerPort: 8443
              name: https
          command: ["/app/payment-service"]
          args:
            - "--db-password=Sup3rS3cret!Passw0rd"
            - "--stripe-key=sk_live_4eC39HqLyjWDarjtT1zdp7dc"
            - "--tls-cert=/certs/tls.crt"
          env:
            - name: DB_PASSWORD
              value: "Sup3rS3cret!Passw0rd"
            - name: DB_HOST
              value: "postgres-primary.production.svc.cluster.local"
            - name: DB_USER
              value: "payment_admin"
            - name: STRIPE_SECRET_KEY
              value: "sk_live_4eC39HqLyjWDarjtT1zdp7dc"
            - name: STRIPE_WEBHOOK_SECRET
              value: "whsec_5Gsf2k9Kc3Jm2lQpNxYZ"
            - name: JWT_SIGNING_KEY
              value: "eyJhbGciOiJSUzI1NiIsInR5cCI6IkpXVCJ9.secret-key-material"
            - name: ENCRYPTION_KEY
              value: "aes256:b3BlbnNzbC1rZXktdjEAAAAA"
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
          volumeMounts:
            - name: certs
              mountPath: /certs
              readOnly: true
      volumes:
        - name: certs
          secret:
            secretName: payment-tls
---
apiVersion: v1
kind: Service
metadata:
  name: payment-service
  namespace: production
spec:
  selector:
    app: payment-service
  ports:
    - port: 443
      targetPort: 8443
      name: https
