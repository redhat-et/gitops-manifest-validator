# TEST SCENARIO: Broken RBAC chain
# Deployment references ServiceAccount "monitoring-sa"
# Role exists but RoleBinding binds to wrong ServiceAccount
# Also: NetworkPolicy selector doesn't match any pods
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: monitoring-agent
  namespace: monitoring
  labels:
    app: monitoring-agent
    component: metrics
spec:
  replicas: 1
  selector:
    matchLabels:
      app: monitoring-agent
  template:
    metadata:
      labels:
        app: monitoring-agent
        component: metrics
    spec:
      serviceAccountName: monitoring-sa
      containers:
      - name: agent
        image: prom/node-exporter:v1.7
        ports:
        - containerPort: 9100
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: metrics-collector
  namespace: monitoring
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: monitoring-role
  namespace: monitoring
rules:
- apiGroups: [""]
  resources: ["pods", "nodes", "services"]
  verbs: ["get", "list", "watch"]
- apiGroups: ["apps"]
  resources: ["deployments"]
  verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: monitoring-binding
  namespace: monitoring
subjects:
- kind: ServiceAccount
  name: metrics-collector
  namespace: monitoring
roleRef:
  kind: Role
  name: monitoring-role
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: monitoring-netpol
  namespace: monitoring
spec:
  podSelector:
    matchLabels:
      app: prometheus
  ingress:
  - from:
    - podSelector:
        matchLabels:
          app: grafana
    ports:
    - protocol: TCP
      port: 9090
---
apiVersion: v1
kind: Service
metadata:
  name: monitoring-agent
  namespace: monitoring
spec:
  selector:
    app: monitoring-agent
  ports:
  - port: 9100
    targetPort: 9100
